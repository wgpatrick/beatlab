name: Deploy BeatLab to willpatrick.xyz/musiclearning

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BeatLab repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout main site repo
        uses: actions/checkout@v4
        with:
          repository: wgpatrick/wgpatrick.github.io
          path: main-site
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Deploy to main site
        run: |
          rm -rf main-site/musiclearning
          cp -r dist main-site/musiclearning
          cd main-site
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add musiclearning/
          git commit -m "Deploy BeatLab from beatlab repo" --allow-empty
          git push
